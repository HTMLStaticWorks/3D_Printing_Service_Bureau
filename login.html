<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Precision 3D</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background-color: var(--body-bg);
            color: var(--body-text);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }
        .brand-link {
            display: block;
            text-align: center;
            margin-bottom: 25px;
            text-decoration: none;
            color: var(--secondary) !important;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .auth-link {
            color: var(--secondary) !important;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .auth-link:hover {
            color: var(--secondary-hover) !important;
            text-decoration: underline;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-header h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .auth-header p {
            color: var(--secondary);
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0;
        }
        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .form-control {
            padding: 12px 15px;
            font-size: 0.9rem;
            border: 0 !important;
            background-color: rgba(128, 128, 128, 0.1) !important;
        }
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .social-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0 15px;
            color: #ccc;
        }
        .social-divider::before, .social-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .social-divider span {
            padding: 0 15px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .social-text {
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 15px;
            color: var(--body-text);
            opacity: 0.6;
        }
        .social-icons-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .btn-social-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.25rem;
            cursor: pointer;
        }
        .btn-social-circle:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .icon-google { color: #DB4437; }
        .icon-facebook { color: #1877F2; }

        @media (max-width: 576px) {
            .auth-card {
                padding: 30px;
                max-width: 90%;
            }
            .auth-header h2 { font-size: 1.5rem; }
            #theme-toggle {
                top: 20px !important;
                right: 20px !important;
                width: 42px !important;
                height: 42px !important;
                padding: 0 !important;
            }
        }
    </style>
    <!-- Favicon -->
    
    
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

    <button class="theme-switch shadow" id="theme-toggle" style="position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--card-bg) !important;">
        <i class="fas fa-moon"></i>
    </button>

    <div class="auth-card fade-in appear">
        <a class="brand-logo-container" href="index.html" style="justify-content: center; margin-bottom: 25px;">
            <i class="fas fa-cube brand-logo-icon"></i>
            <span class="brand-name">PRECISION 3D</span>
        </a>
        
        <div class="auth-header">
            <h2>Welcome back</h2>
            <p>Login to your account</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" class="form-control" placeholder="john@company.com" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="remember-forgot">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="auth-link fw-bold">Forgot password?</a>
            </div>

            <a href="dashboard.html" class="btn btn-primary w-100 py-3 mb-3 rounded-3 shadow-sm fw-bold">Login now</a>

            <div class="social-divider">
                <span>Or</span>
            </div>

            <div class="social-text">Continue with</div>

            <div class="social-icons-wrapper">
                <button type="button" class="btn-social-circle">
                    <i class="fab fa-google icon-google"></i>
                </button>
                <button type="button" class="btn-social-circle">
                    <i class="fab fa-facebook icon-facebook"></i>
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small mb-0" style="color: var(--body-text); opacity: 0.8;">Don't have an account? <a href="signup.html" class="auth-link fw-bold ms-1">Sign up</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
