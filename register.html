<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | 3D Printing Service Bureau</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
    </style>
    <!-- Favicon -->
    
    
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 reveal">
                <div class="p-5 bg-card border border-light border-opacity-10 rounded-4 shadow-lg text-center">
                    <a href="index.html" class="d-inline-flex align-items-center mb-5 text-decoration-none">
                        <i class="bi bi-box-seam-fill me-2 fs-3 text-accent"></i>
                        <span class="fw-bold text-uppercase fs-4 text-white">3D<span class="text-accent">BUREAU</span></span>
                    </a>
                    <h3 class="text-white mb-1">Create Technical Account</h3>
                    <p class="text-body small mb-5">Access professional additive production and instant quoting.</p>
                    <form action="user-dashboard.html" class="needs-validation text-start" novalidate>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><label class="form-label text-white small">Primary Contact Name</label><input type="text" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label text-white small">Company Legal Entity</label><input type="text" class="form-control" required></div>
                            <div class="col-12"><label class="form-label text-white small">Business Email Address</label><input type="email" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label text-white small">Industry Sector</label><select class="form-select bg-dark border-secondary border-opacity-25 text-white" required><option>Aerospace</option><option>Medical</option><option>Automotive</option><option>Architecture</option></select></div>
                            <div class="col-md-6"><label class="form-label text-white small">Monthly Potential Units</label><select class="form-select bg-dark border-secondary border-opacity-25 text-white" required><option>1-10 (Prototyping)</option><option>11-100 (SME)</option><option>100+ (Enterprise)</option></select></div>
                            <div class="col-12 mt-4"><label class="form-label text-white small">Choose Secure Password</label><input type="password" class="form-control" placeholder="••••••••" required></div>
                        </div>
                        <div class="mb-5 form-check"><input type="checkbox" class="form-check-input" id="termsCheck" required><label class="form-check-label text-body small" for="termsCheck">I agree strictly to the <a href="#" class="text-accent">Industrial Terms of Data Processing</a> and NDAs.</label></div>
                        <button type="submit" class="btn btn-accent text-white w-100 py-3 fw-bold rounded-3">Register Bureau Access</button>
                    </form>
                    <div class="mt-5 pt-4 border-top border-light border-opacity-10">
                        <p class="text-body small mb-0">Already registered? <a href="login.html" class="text-accent fw-bold text-decoration-none">Client Login</a></p>
                    </div>
                </div>
                <div class="text-center mt-5">
                    <a href="index.html" class="text-body small text-decoration-none opacity-50 hover-opacity-1"><i class="bi bi-arrow-left me-2"></i> Return To Main Website</a>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>
</html>
